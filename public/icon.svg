<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#0e1116"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa7ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#7aa7ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#7aa7ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- rounded-square tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>

  <!-- subtle inner stroke for depth -->
  <rect x="6" y="6" width="1012" height="1012" rx="176" ry="176"
        fill="none" stroke="#2a2f3a" stroke-width="2"/>

  <!-- glow behind the dot -->
  <circle cx="320" cy="560" r="220" fill="url(#dotGlow)"/>

  <!-- the dot (the "." of .ai) -->
  <circle cx="320" cy="560" r="86" fill="#7aa7ff"/>

  <!-- "ai" wordmark, lowercase, geometric -->
  <g fill="#e8eaee" font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', monospace"
     font-weight="700" font-size="360" letter-spacing="-12">
    <text x="450" y="668">ai</text>
  </g>
</svg>
